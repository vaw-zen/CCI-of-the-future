name: Daily Facebook Post with Gemini AI

on:
  schedule:
    # Run every day at 10:00 AM Tunisia time (UTC+1 = 9:00 AM UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Type of post to generate'
        required: false
        default: 'auto'
        type: choice
        options:
        - auto
        - tip
        - motivation
        - service
        - seasonal
      force_service:
        description: 'Force a specific service topic'
        required: false
        default: 'auto'
        type: choice
        options:
        - auto
        - salon
        - tapis
        - marbre
        - tapisserie
        - tfc
      custom_prompt:
        description: 'Custom prompt for Gemini AI (optional)'
        required: false
        type: string
      dry_run:
        description: 'Preview only — generate content without posting to Facebook'
        required: false
        default: false
        type: boolean

permissions:
  actions: read

# Prevent duplicate posts from overlapping runs
concurrency:
  group: facebook-daily-post
  cancel-in-progress: false

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    # ── Step 1: Health check ──────────────────────────────────────────
    - name: Verify API is reachable
      run: |
        echo "🏥 Running health check..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
          https://cciservices.online/api/auto-post-daily)
        
        if [ "$HTTP_CODE" -ne 200 ]; then
          echo "❌ API health check failed (HTTP $HTTP_CODE)"
          echo "## ❌ API Health Check Failed" >> $GITHUB_STEP_SUMMARY
          echo "The API at \`cciservices.online\` returned HTTP **$HTTP_CODE**." >> $GITHUB_STEP_SUMMARY
          echo "The site may be down or the endpoint has moved." >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        echo "✅ API is healthy (HTTP $HTTP_CODE)"

    # ── Step 2: Determine post configuration ──────────────────────────
    - name: Configure post parameters
      id: config
      run: |
        # ── Post type selection ──
        INPUT_TYPE="${{ github.event.inputs.post_type }}"
        
        if [ "$INPUT_TYPE" != "" ] && [ "$INPUT_TYPE" != "auto" ]; then
          POST_TYPE="$INPUT_TYPE"
        else
          # Weekday-based rotation for predictable content mix
          # Mon=tip, Tue=service, Wed=motivation, Thu=service, Fri=tip, Sat=seasonal, Sun=motivation
          DOW=$(date +%u)  # 1=Monday ... 7=Sunday
          case $DOW in
            1) POST_TYPE="tip" ;;
            2) POST_TYPE="service" ;;
            3) POST_TYPE="motivation" ;;
            4) POST_TYPE="service" ;;
            5) POST_TYPE="tip" ;;
            6) POST_TYPE="seasonal" ;;
            7) POST_TYPE="motivation" ;;
          esac
        fi

        # ── Season detection ──
        MONTH_NUM=$(date +%-m)
        case $MONTH_NUM in
          12|1|2)  CURRENT_SEASON="hiver" ;;
          3|4|5)   CURRENT_SEASON="printemps" ;;
          6|7|8)   CURRENT_SEASON="été" ;;
          9|10|11) CURRENT_SEASON="automne" ;;
        esac

        CURRENT_MONTH=$(date +%B)
        DRY_RUN="${{ github.event.inputs.dry_run }}"
        FORCE_SERVICE="${{ github.event.inputs.force_service }}"

        echo "post_type=$POST_TYPE" >> $GITHUB_OUTPUT
        echo "current_season=$CURRENT_SEASON" >> $GITHUB_OUTPUT
        echo "current_month=$CURRENT_MONTH" >> $GITHUB_OUTPUT
        echo "dry_run=${DRY_RUN:-false}" >> $GITHUB_OUTPUT
        echo "force_service=${FORCE_SERVICE:-auto}" >> $GITHUB_OUTPUT

        echo "📋 Configuration:"
        echo "   Post type:    $POST_TYPE"
        echo "   Season:       $CURRENT_SEASON"
        echo "   Month:        $CURRENT_MONTH"
        echo "   Dry run:      ${DRY_RUN:-false}"
        echo "   Force service: ${FORCE_SERVICE:-auto}"

    # ── Step 3: Generate & Post ───────────────────────────────────────
    - name: Generate and post to Facebook
      id: post
      env:
        CUSTOM_PROMPT: ${{ github.event.inputs.custom_prompt }}
      run: |
        POST_TYPE="${{ steps.config.outputs.post_type }}"
        SEASON="${{ steps.config.outputs.current_season }}"
        MONTH="${{ steps.config.outputs.current_month }}"
        DRY_RUN="${{ steps.config.outputs.dry_run }}"
        FORCE_SVC="${{ steps.config.outputs.force_service }}"

        echo "📝 Generating $POST_TYPE post..."

        # ── Build JSON payload safely with jq ──
        PAYLOAD=$(jq -n \
          --arg postType "$POST_TYPE" \
          --arg currentSeason "$SEASON" \
          --arg currentMonth "$MONTH" \
          --argjson includeHashtags true \
          --argjson includeImage true \
          --argjson dryRun "${DRY_RUN}" \
          '{postType: $postType, currentSeason: $currentSeason, currentMonth: $currentMonth, includeHashtags: $includeHashtags, includeImage: $includeImage, dryRun: $dryRun}')

        # Add optional forceService
        if [ "$FORCE_SVC" != "" ] && [ "$FORCE_SVC" != "auto" ]; then
          PAYLOAD=$(echo "$PAYLOAD" | jq --arg fs "$FORCE_SVC" '. + {forceService: $fs}')
        fi

        # Add optional custom prompt
        if [ "$CUSTOM_PROMPT" != "" ]; then
          PAYLOAD=$(echo "$PAYLOAD" | jq --arg cp "$CUSTOM_PROMPT" '. + {customPrompt: $cp}')
        fi

        echo "📦 Payload: $PAYLOAD"

        # ── Retry loop: 3 attempts with exponential backoff ──
        MAX_RETRIES=3
        RETRY_DELAYS=(0 30 90)
        SUCCESS=false

        for ATTEMPT in $(seq 1 $MAX_RETRIES); do
          DELAY=${RETRY_DELAYS[$((ATTEMPT - 1))]}
          
          if [ "$DELAY" -gt 0 ]; then
            echo "⏳ Retry $ATTEMPT/$MAX_RETRIES — waiting ${DELAY}s..."
            sleep $DELAY
          fi

          echo "🚀 Attempt $ATTEMPT/$MAX_RETRIES..."

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 \
            -X POST https://cciservices.online/api/auto-post-daily \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || true

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -1)
          RESPONSE=$(echo "$HTTP_RESPONSE" | sed '$d')

          # Check for success
          API_SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false' 2>/dev/null || echo "false")

          if [ "$API_SUCCESS" = "true" ]; then
            SUCCESS=true
            echo "✅ Post succeeded on attempt $ATTEMPT"
            break
          fi

          echo "⚠️ Attempt $ATTEMPT failed (HTTP $HTTP_CODE)"
          
          # Don't retry on 4xx client errors (bad request, auth issues)
          if [ "$HTTP_CODE" -ge 400 ] && [ "$HTTP_CODE" -lt 500 ]; then
            echo "🚫 Client error — not retrying"
            break
          fi
        done

        # ── Process result ──
        if [ "$SUCCESS" = "true" ]; then
          CONTENT=$(echo "$RESPONSE" | jq -r '.generated_content // "N/A"')
          IMAGE_URL=$(echo "$RESPONSE" | jq -r '.selected_image // "none"')
          FB_POST_ID=$(echo "$RESPONSE" | jq -r '.facebook_response.id // "N/A"')
          HAS_IMAGE=$(echo "$RESPONSE" | jq -r '.posted_with_image // false')
          DETECTED_SVC=$(echo "$RESPONSE" | jq -r '.content_analysis.detected_service // "unknown"')
          SVC_URL=$(echo "$RESPONSE" | jq -r '.content_analysis.service_url // "N/A"')
          NEXT_SVC=$(echo "$RESPONSE" | jq -r '.rotation_info.next_recommended // "N/A"')
          CHAR_COUNT=${#CONTENT}

          echo "result=success" >> $GITHUB_OUTPUT
          echo "fb_post_id=$FB_POST_ID" >> $GITHUB_OUTPUT
          echo "detected_service=$DETECTED_SVC" >> $GITHUB_OUTPUT
          echo "attempts=$ATTEMPT" >> $GITHUB_OUTPUT

          # ── Rich GitHub Actions Summary ──
          {
            if [ "$DRY_RUN" = "true" ]; then
              echo "## 👁️ Dry Run Preview"
              echo "> Content was generated but **NOT posted** to Facebook."
              echo ""
            else
              echo "## ✅ Daily Post Success"
            fi

            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| **Post Type** | \`$POST_TYPE\` |"
            echo "| **Service Detected** | \`$DETECTED_SVC\` |"
            echo "| **Characters** | $CHAR_COUNT |"
            echo "| **Posted with Image** | $HAS_IMAGE |"
            if [ "$DRY_RUN" != "true" ]; then
              echo "| **Facebook Post ID** | \`$FB_POST_ID\` |"
            fi
            echo "| **Attempts** | $ATTEMPT/$MAX_RETRIES |"
            echo "| **Next Recommended** | \`$NEXT_SVC\` |"
            echo "| **Season** | $SEASON |"
            echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo ""

            if [ "$IMAGE_URL" != "none" ] && [ "$IMAGE_URL" != "null" ]; then
              echo "### 🖼️ Selected Image"
              echo "![$DETECTED_SVC]($IMAGE_URL)"
              echo ""
            fi

            echo "### 📝 Generated Content"
            echo '```'
            echo "$CONTENT"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
        else
          ERROR=$(echo "$RESPONSE" | jq -r '.error // "Unknown error"' 2>/dev/null || echo "No response from API")

          echo "result=failure" >> $GITHUB_OUTPUT
          echo "error=$ERROR" >> $GITHUB_OUTPUT

          {
            echo "## ❌ Daily Post Failed"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| **Post Type** | \`$POST_TYPE\` |"
            echo "| **HTTP Code** | \`$HTTP_CODE\` |"
            echo "| **Attempts** | $MAX_RETRIES/$MAX_RETRIES |"
            echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo ""
            echo "### Error"
            echo '```'
            echo "$ERROR"
            echo '```'
            echo ""
            echo "### Raw Response"
            echo '```json'
            echo "$RESPONSE" | jq '.' 2>/dev/null || echo "$RESPONSE"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

          exit 1
        fi

    # ── Step 4: Alert on failure ──────────────────────────────────────
    - name: Send failure alert
      if: failure()
      env:
        ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      run: |
        TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
        ERROR="${{ steps.post.outputs.error }}"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        echo "🔔 Sending failure alert..."

        # Send to webhook if configured (works with Slack, Discord, etc.)
        if [ "$ALERT_WEBHOOK_URL" != "" ]; then
          curl -s --max-time 10 -X POST "$ALERT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg text "❌ CCI Facebook auto-post failed at $TIMESTAMP\nError: $ERROR\nDetails: $RUN_URL" \
              --arg content "❌ CCI Facebook auto-post failed at $TIMESTAMP\nError: $ERROR\nDetails: $RUN_URL" \
              '{text: $text, content: $content}')" || true
          echo "✅ Alert sent to webhook"
        else
          echo "⚠️ No ALERT_WEBHOOK_URL configured — skipping webhook notification"
          echo "💡 Add a Slack/Discord webhook URL as ALERT_WEBHOOK_URL secret for failure alerts"
        fi